name: Release

on:
    push:
        tags:
            - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
    contents: read
    packages: read

jobs:
    validate:
        name: Validate release tag
        runs-on: ubuntu-22.04
        steps:
            - name: Checkout repository
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                  fetch-depth: 0

            - name: Verify tag is reachable from main
              shell: bash
              run: |
                  git fetch origin main

                  if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
                      echo "::error::Tag '$GITHUB_REF_NAME' does not point at a commit reachable from main."
                      exit 1
                  fi

            - name: Verify tag matches package version
              shell: bash
              run: |
                  packageVersion=$(node -p "require('./package.json').version")

                  if [ "${GITHUB_REF_NAME#v}" != "$packageVersion" ]; then
                      echo "::error::Tag '$GITHUB_REF_NAME' does not match package.json version '$packageVersion'."
                      exit 1
                  fi

            - name: Verify tag has a matching changelog section
              shell: bash
              env:
                  RELEASED_VERSION: ${{ github.ref_name }}
              run: node scripts/check-changelog-section.mjs

            - name: Setup workspace
              uses: ./
              with:
                  node-auth-token: ${{ secrets.GITHUB_TOKEN }}

            - name: Check formatting
              shell: bash
              run: pnpm format-check

            - name: Lint markdown
              shell: bash
              run: pnpm lint-md

    create-release:
        name: Create GitHub release
        needs: validate
        runs-on: ubuntu-22.04
        permissions:
            contents: write
            discussions: write
        steps:
            - name: Checkout repository
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

            - name: Setup workspace
              uses: ./
              with:
                  install-dependencies: 'false'

            - name: Prepare release notes
              shell: bash
              env:
                  RELEASED_VERSION: ${{ github.ref_name }}
              run: node scripts/prepare-release-notes.mjs

            - name: Create GitHub release
              shell: bash
              env:
                  GH_TOKEN: ${{ github.token }}
              run: |
                  gh release create "$GITHUB_REF_NAME" \
                      --notes-file .github/release-notes.md \
                      --discussion-category "Announcements"
